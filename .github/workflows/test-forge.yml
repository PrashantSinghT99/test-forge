name: Test Forge CI/CD Pipeline
on:
  push:
    branches:
      - master
  workflow_dispatch:   # allows manual trigger from GitHub Actions UI
  schedule:
    - cron: '0 2 * * *'   # daily at 02:00 UTC (07:30 IST)

permissions:
  contents: write
  pull-requests: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # ─────────────────────────────────────────────────────────────
  # JOB 1: Lint — enforce Ruff code quality on every run
  # ─────────────────────────────────────────────────────────────
  lint:
    name: Ruff Linter
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Install Ruff
        run: pip install ruff

      - name: Run Ruff linter
        run: ruff check . --output-format=github

      - name: Run Ruff formatter check
        run: ruff format --check .

  # ─────────────────────────────────────────────────────────────
  # JOB 2: Test — parallel matrix across no_ai / ai / stagehand
  # ─────────────────────────────────────────────────────────────
  test:
    needs: lint
    timeout-minutes: 30
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - branch: no_ai
            make_target: test-no-ai
            pr_prefix: "[Non-AI Self-Healing]"
          - branch: ai
            make_target: test-ai
            pr_prefix: "[AI Self-Healing]"
          - branch: stagehand
            make_target: test-stagehand
            pr_prefix: "[Stagehand Self-Healing]"
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: make install

      - name: Debug environment
        run: |
          python --version
          python -m pip show pytest
          python -c "import sys; print('Python:', sys.executable)"

      - name: Install Playwright browsers
        run: make install-browsers

      - name: Run branch tests
        continue-on-error: true
        env:
          HF_API_TOKEN: ${{ secrets.HF_API_TOKEN }}
        run: make ${{ matrix.make_target }}

      # Self-Healing PR: apply patch, push branch, open PR — NEVER MERGE
      - name: Create PR with Healed Locators
        if: always() && (matrix.branch == 'no_ai' || matrix.branch == 'ai')
        run: |
          PATCH_FILE="reports/${{ matrix.branch }}/healing_patch.diff"
          if [ -f "$PATCH_FILE" ] && [ -s "$PATCH_FILE" ]; then
            echo "[CI/CD] Healing patch detected. Applying fixes..."
            git apply --ignore-space-change --ignore-whitespace "$PATCH_FILE"

            git config --global user.name "github-actions[bot]"
            git config --global user.email "github-actions[bot]@users.noreply.github.com"

            BRANCH_NAME="self-healing-${{ matrix.branch }}-${{ github.run_id }}"
            git checkout -b "$BRANCH_NAME"
            git add .
            git commit -m "style(test): auto-fix broken locators via self-healing in ${{ matrix.branch }}"
            git push --force origin "$BRANCH_NAME"

            PR_TITLE="${{ matrix.pr_prefix }} Fix locator drift in ${{ matrix.branch }} - DO NOT MERGE"
            gh pr create \
              --title "$PR_TITLE" \
              --body "$PR_BODY" \
              --head "$BRANCH_NAME" \
              --base master || echo "[CI/CD] PR already exists for this branch."
          else
            echo "[CI/CD] No healing patch found or file is empty."
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_BODY: |
            ## Auto-generated Self-Healing PR

            This PR was automatically generated by the Test Forge CI/CD self-healing pipeline.

            > WARNING: DO NOT MERGE THIS PR
            >
            > The broken locators are intentional permanent fixtures for demo purposes.
            > Merging this would fix the locators in master, breaking the self-healing demo on the next CI run.
            > Close this PR after review - the next CI run will open a fresh one.

            ### What happened
            - Tests ran with intentionally broken locators
            - The self-healing engine detected failures at runtime
            - It scanned the DOM, scored candidates, and resolved the correct locators
            - The tests passed (healed), and this PR shows what the permanent fix would look like

            ### Evidence
            - Test passed with healed locator (runtime-only, not committed to master)
            - Full HTML report uploaded as CI artifact
            - Before/After screenshots embedded in report

      - name: Upload branch reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: reports-${{ matrix.branch }}
          path: reports/${{ matrix.branch }}/

      - name: Upload raw evidence (screenshots and videos)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: evidence-${{ matrix.branch }}
          path: |
            videos/
            screenshots/
            logs/

  # ─────────────────────────────────────────────────────────────
  # JOB 3: Deploy — consolidate reports and publish to Pages
  # ─────────────────────────────────────────────────────────────
  deploy-report:
    needs: test
    if: always()
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Download all reports
        uses: actions/download-artifact@v4
        with:
          path: merged-reports

      - name: Consolidate reports structure
        run: |
          echo "=== Downloaded artifact structure ==="
          find merged-reports -type f | head -50 || true

          mkdir -p reports/no_ai reports/ai reports/stagehand

          if [ -d "merged-reports/reports-no_ai" ]; then
            cp -r merged-reports/reports-no_ai/. reports/no_ai/
            echo "Copied no_ai reports"
          else
            echo "WARNING: no_ai reports not found"
          fi
          if [ -d "merged-reports/reports-ai" ]; then
            cp -r merged-reports/reports-ai/. reports/ai/
            echo "Copied ai reports"
          else
            echo "WARNING: ai reports not found"
          fi
          if [ -d "merged-reports/reports-stagehand" ]; then
            cp -r merged-reports/reports-stagehand/. reports/stagehand/
            echo "Copied stagehand reports"
          fi

          echo "=== Final reports structure ==="
          find reports -type f | head -50 || true

          for branch in no_ai ai stagehand; do
            if [ -f "reports/$branch/report.html" ]; then
              cp "reports/$branch/report.html" "reports/$branch/index.html"
              echo "Created index.html for $branch"
            else
              echo "WARNING: reports/$branch/report.html not found, creating placeholder"
              echo "<html><body><h2>No report available for $branch yet.</h2></body></html>" > "reports/$branch/index.html"
            fi
          done

          python scripts/generate_dashboard.py reports
          echo "Dashboard created"

      - name: Upload Report to Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: reports/

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Add Report Link to Summary
        run: |
          echo "### Test Forge QA Dashboard" >> $GITHUB_STEP_SUMMARY
          echo "Reports consolidated and deployed." >> $GITHUB_STEP_SUMMARY
          echo "View Dashboard: ${{ steps.deployment.outputs.page_url }}" >> $GITHUB_STEP_SUMMARY

  # ─────────────────────────────────────────────────────────────
  # JOB 4: Cleanup — daily close of stale self-healing PRs
  # ─────────────────────────────────────────────────────────────
  cleanup-stale-prs:
    name: Cleanup Stale Self-Healing PRs
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4

      - name: Close stale self-healing PRs older than 1 day
        run: |
          echo "Fetching open self-healing PRs..."
          CUTOFF=$(date -d '1 day ago' --iso-8601=seconds)

          gh pr list \
            --state open \
            --search "Self-Healing in:title" \
            --json number,title,createdAt \
            --jq '.[] | select(.createdAt < "'$CUTOFF'") | .number' \
          | while read PR_NUM; do
            echo "Closing stale PR #$PR_NUM..."
            gh pr close "$PR_NUM" \
              --comment "Auto-closed by daily cleanup job. A fresh self-healing PR will be created on the next CI run." \
              --delete-branch || echo "Could not close PR #$PR_NUM"
          done
          echo "Stale PR cleanup complete."
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}