name: Test Forge CI/CD Pipeline
on:
  push:
    branches:
      - master
  workflow_dispatch:   # ← allows manual trigger from GitHub Actions UI

permissions:
  contents: write
  pull-requests: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  test:
    timeout-minutes: 30
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - branch: no_ai
            make_target: test-no-ai
          - branch: ai
            make_target: test-ai
          - branch: stagehand
            make_target: test-stagehand
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: make install

      - name: Debug environment
        run: |
          python --version
          python -m pip show pytest
          python -c "import sys; print('Python:', sys.executable)"

      - name: Install Playwright browsers
        run: make install-browsers

      - name: Run branch tests
        continue-on-error: true
        env:
          HF_API_TOKEN: ${{ secrets.HF_API_TOKEN }}
        run: make ${{ matrix.make_target }}

      # 🤖 Self-Healing PR Demo: apply patch → push branch → open PR → NEVER MERGE
      # The broken locator in test_login_healing_standard_user is intentionally permanent.
      # This step proves the self-healer works on every CI run. The PR is a record of
      # what fix would be applied — do NOT merge it, so master always stays broken.
      - name: Create PR with Healed Locators
        if: always() && (matrix.branch == 'no_ai' || matrix.branch == 'ai')
        run: |
          PATCH_FILE="reports/${{ matrix.branch }}/healing_patch.diff"
          if [ -f "$PATCH_FILE" ] && [ -s "$PATCH_FILE" ]; then
            echo "[CI/CD] Healing patch detected. Applying fixes..."
            git apply --ignore-space-change --ignore-whitespace "$PATCH_FILE"
            
            # Setup git configs
            git config --global user.name "github-actions[bot]"
            git config --global user.email "github-actions[bot]@users.noreply.github.com"
            
            # Create branch, commit and push changes
            BRANCH_NAME="self-healing-${{ matrix.branch }}-${{ github.run_id }}"
            git checkout -b "$BRANCH_NAME"
            git add .
            git commit -m "style(test): auto-fix broken locators via self-healing in ${{ matrix.branch }}"
            
            # Delete old healing branches for this matrix branch to avoid stale PRs
            # Force push branch to handle job re-runs (same run_id)
            git push --force origin "$BRANCH_NAME"
            
            # Use GitHub CLI to create PR with explicit never-merge note
            gh pr create \
              --title "🤖 [Self-Healing Demo] Fix locator drifts in ${{ matrix.branch }} — DO NOT MERGE" \
              --body "$PR_BODY" \
              --head "$BRANCH_NAME" \
              --base master || echo "[CI/CD] PR already created for this branch."
          else
            echo "[CI/CD] No healing patch found or file is empty."
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_BODY: |
            ## 🤖 Auto-generated Self-Healing PR

            This PR was automatically generated by the CI/CD self-healing pipeline.

            > ⚠️ **DO NOT MERGE THIS PR** ⚠️
            > 
            > The broken locator in `test_login_healing_standard_user` is an **intentional permanent fixture** for demo purposes.  
            > Merging this would fix the locator in `master`, breaking the self-healing demo on the next CI run.  
            > Close this PR after review — the next CI run will open a fresh one.

            ### What happened
            - The test used a broken XPath locator `//input[@id='user-name-broken']`
            - The self-healing engine detected the failure at runtime
            - It scanned the DOM, scored candidates, and resolved the correct locator `//*[@id="user-name"]`
            - The test passed (healed), and this PR shows what the permanent fix would look like

            ### Evidence
            - ✅ Test passed with healed locator (runtime-only, not committed to master)
            - 📊 Full HTML report uploaded as CI artifact
            - 🔍 Before/After screenshots embedded in report

      - name: Upload branch reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: reports-${{ matrix.branch }}
          path: reports/${{ matrix.branch }}/

      - name: Upload raw evidence (screenshots & videos)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: evidence-${{ matrix.branch }}
          path: |
            videos/
            screenshots/
            logs/

  deploy-report:
    needs: test
    if: always()
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download all reports
        uses: actions/download-artifact@v4
        with:
          path: merged-reports

      - name: Consolidate reports structure
        run: |
          # Debug: show what was downloaded
          echo "=== Downloaded artifact structure ==="
          find merged-reports -type f | head -50 || true

          mkdir -p reports/no_ai reports/ai reports/stagehand

          # Copy outputs back to main reports directories
          if [ -d "merged-reports/reports-no_ai" ]; then
            cp -r merged-reports/reports-no_ai/. reports/no_ai/
            echo "Copied no_ai reports"
          else
            echo "WARNING: no_ai reports not found in merged-reports"
          fi
          if [ -d "merged-reports/reports-ai" ]; then
            cp -r merged-reports/reports-ai/. reports/ai/
            echo "Copied ai reports"
          else
            echo "WARNING: ai reports not found in merged-reports"
          fi
          if [ -d "merged-reports/reports-stagehand" ]; then
            cp -r merged-reports/reports-stagehand/. reports/stagehand/
            echo "Copied stagehand reports"
          fi

          echo "=== Final reports structure ==="
          find reports -type f | head -50 || true

          # Ensure index.html exists for each branch
          for branch in no_ai ai stagehand; do
            if [ -f "reports/$branch/report.html" ]; then
              cp "reports/$branch/report.html" "reports/$branch/index.html"
              echo "Created index.html for $branch"
            else
              echo "WARNING: reports/$branch/report.html not found, creating placeholder"
              echo "<html><body><h2>No report available for $branch yet.</h2></body></html>" > "reports/$branch/index.html"
            fi
          done

          # Create dashboard index.html
          cat > reports/index.html << 'DASHBOARD'
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Forge — QA Intelligence Dashboard</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background: #0f172a; color: #e2e8f0; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 40px 20px; }
        .container { max-width: 860px; width: 100%; background: #1e293b; padding: 40px; border-radius: 16px; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5); }
        h1 { color: #38bdf8; text-align: center; margin-bottom: 8px; font-size: 2rem; }
        .subtitle { text-align: center; color: #94a3b8; margin-bottom: 36px; font-size: 0.95rem; }
        .branch-card { display: flex; justify-content: space-between; align-items: center; background: #334155; padding: 22px 28px; border-radius: 12px; margin-bottom: 16px; border: 1px solid #475569; transition: border-color 0.2s; }
        .branch-card:hover { border-color: #38bdf8; }
        .branch-info .branch-name { font-size: 1.1rem; font-weight: 700; margin-bottom: 4px; }
        .branch-info .branch-desc { font-size: 0.82rem; color: #94a3b8; }
        .btn { background: #0284c7; color: white; padding: 10px 22px; border-radius: 8px; text-decoration: none; font-size: 0.9rem; font-weight: 600; transition: background 0.2s, transform 0.1s; display: inline-block; }
        .btn:hover { background: #0369a1; transform: translateY(-1px); }
    </style>
</head>
<body>
    <div class="container">
        <h1>📊 QA Intelligence Dashboard</h1>
        <p class="subtitle">Test Forge — Parallel Branch Execution Reports</p>
        <div class="branch-card">
            <div class="branch-info">
                <div class="branch-name">🔬 Deterministic Branch (No AI)</div>
                <div class="branch-desc">Self-healing locators · Failure classification · Flaky detection</div>
            </div>
            <a class="btn" href="no_ai/index.html">View Reports</a>
        </div>
        <div class="branch-card">
            <div class="branch-info">
                <div class="branch-name">🤖 AI-Assisted Branch</div>
                <div class="branch-desc">LLM-powered healing · AI assertion analysis</div>
            </div>
            <a class="btn" href="ai/index.html">View Reports</a>
        </div>
        <div class="branch-card">
            <div class="branch-info">
                <div class="branch-name">🕹️ Stagehand Branch (Browser Agent)</div>
                <div class="branch-desc">Declarative AI browser agent execution</div>
            </div>
            <a class="btn" href="stagehand/index.html">View Reports</a>
        </div>
    </div>
</body>
</html>
DASHBOARD
          echo "Dashboard index.html created"

      - name: Upload Report to Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: reports/

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Add Report Link to Summary
        run: |
          echo "### 📊 Parallel Execution Reports Dashboard" >> $GITHUB_STEP_SUMMARY
          echo "Parallel run results consolidated successfully." >> $GITHUB_STEP_SUMMARY
          echo "👉 [Click Here to View Dashboard](${{ steps.deployment.outputs.page_url }})" >> $GITHUB_STEP_SUMMARY