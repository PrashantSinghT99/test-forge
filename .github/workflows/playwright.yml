name: Playwright Tests
on:
  push:
    branches:
      - master

permissions:
  contents: write
  pull-requests: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  test:
    timeout-minutes: 30
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        branch: [no_ai, ai, stagehand]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Install uv
        run: pip install uv

      - name: Install dependencies
        run: |
          pip install -e ".[test]"

      - name: Ensure browsers are installed
        run: python -m playwright install --with-deps chromium

      - name: Run branch tests
        continue-on-error: true
        env:
          HF_API_TOKEN: ${{ secrets.HF_API_TOKEN }}
        run: |
          if [ "${{ matrix.branch }}" = "no_ai" ]; then
            python runner.py --branch no_ai --self-heal --classify --retries 2
          elif [ "${{ matrix.branch }}" = "ai" ]; then
            python runner.py --branch ai --self-heal --classify
          else
            python runner.py --branch stagehand
          fi

      # 🤖 Automatic PR Creation: Apply self-healing patch and create PR
      - name: Create PR with Healed Locators
        if: always() && (matrix.branch == 'no_ai' || matrix.branch == 'ai')
        run: |
          PATCH_FILE="reports/${{ matrix.branch }}/healing_patch.diff"
          if [ -f "$PATCH_FILE" ] && [ -s "$PATCH_FILE" ]; then
            echo "[CI/CD] Healing patch detected. Applying fixes..."
            git apply "$PATCH_FILE"
            
            # Setup git configs
            git config --global user.name "github-actions[bot]"
            git config --global user.email "github-actions[bot]@users.noreply.github.com"
            
            # Create branch, commit and push changes
            BRANCH_NAME="self-healing-${{ matrix.branch }}-${{ github.run_id }}"
            git checkout -b "$BRANCH_NAME"
            git add .
            git commit -m "style(test): auto-fix broken locators via self-healing in ${{ matrix.branch }}"
            git push origin "$BRANCH_NAME"
            
            # Use GitHub CLI to create PR
            gh pr create \
              --title "🤖 [Self-Healing] Fix locator drifts in ${{ matrix.branch }}" \
              --body "This PR was automatically generated by the CI/CD pipeline. The self-healer resolved locator drifts during test execution. Please review the changes." \
              --head "$BRANCH_NAME" \
              --base master
          else
            echo "[CI/CD] No healing patch found or file is empty."
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload branch reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: reports-${{ matrix.branch }}
          path: reports/${{ matrix.branch }}/

      - name: Upload raw evidence (screenshots & videos)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: evidence-${{ matrix.branch }}
          path: |
            videos/
            screenshots/
            logs/

  deploy-report:
    needs: test
    if: always()
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download all reports
        uses: actions/download-artifact@v4
        with:
          path: merged-reports

      - name: Consolidate reports structure
        run: |
          mkdir -p reports/no_ai reports/ai reports/stagehand
          
          # Copy outputs back to main reports directories
          if [ -d "merged-reports/reports-no_ai" ]; then
            cp -r merged-reports/reports-no_ai/* reports/no_ai/ || true
          fi
          if [ -d "merged-reports/reports-ai" ]; then
            cp -r merged-reports/reports-ai/* reports/ai/ || true
          fi
          if [ -d "merged-reports/reports-stagehand" ]; then
            cp -r merged-reports/reports-stagehand/* reports/stagehand/ || true
          fi
          
          # Create a simple navigation dashboard index.html
          cat << 'EOF' > reports/index.html
          <!DOCTYPE html>
          <html>
          <head>
              <title>Test Automation Reports Dashboard</title>
              <style>
                  body { font-family: 'Segoe UI', Arial, sans-serif; background: #0f172a; color: #e2e8f0; margin: 0; padding: 40px; }
                  .container { max-width: 800px; margin: auto; background: #1e293b; padding: 30px; border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); }
                  h1 { color: #38bdf8; text-align: center; margin-bottom: 30px; }
                  .branch-card { display: flex; justify-content: space-between; align-items: center; background: #334155; padding: 20px; border-radius: 8px; margin-bottom: 16px; border: 1px solid #475569; }
                  .branch-name { font-size: 18px; font-weight: bold; }
                  .btn { background: #0284c7; color: white; padding: 8px 16px; border-radius: 4px; text-decoration: none; font-size: 14px; transition: background 0.2s; }
                  .btn:hover { background: #0369a1; }
              </style>
          </head>
          <body>
              <div class="container">
                  <h1>📊 QA Intelligence Dashboard</h1>
                  <div class="branch-card">
                      <div class="branch-name">Deterministic Branch (No AI)</div>
                      <a class="btn" href="no_ai/" target="_blank">View Reports</a>
                  </div>
                  <div class="branch-card">
                      <div class="branch-name">AI-Assisted Branch</div>
                      <a class="btn" href="ai/" target="_blank">View Reports</a>
                  </div>
                  <div class="branch-card">
                      <div class="branch-name">Stagehand Branch (Browser Agent)</div>
                      <a class="btn" href="stagehand/" target="_blank">View Reports</a>
                  </div>
              </div>
          </body>
          </html>
          EOF
          
          # Ensure index.html exists inside subfolders if pytest HTML reports are not directly visible
          # Find HTML file in subfolders and rename/create a link to it
          for branch in no_ai ai stagehand; do
            cd reports/$branch || continue
            HTML_FILE=$(find . -name "*.html" | head -n 1)
            if [ -n "$HTML_FILE" ]; then
              cp "$HTML_FILE" index.html
            fi
            cd ../..
          done

      - name: Upload Report to Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: reports/

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Add Report Link to Summary
        run: |
          echo "### 📊 Parallel Execution Reports Dashboard" >> $GITHUB_STEP_SUMMARY
          echo "Parallel run results consolidated successfully." >> $GITHUB_STEP_SUMMARY
          echo "👉 [Click Here to View Dashboard](${{ steps.deployment.outputs.page_url }})" >> $GITHUB_STEP_SUMMARY